<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  
  <!-- CSS Personalizzato -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <!-- Menu Navigazione Minimal -->
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <!-- Esempio di un link extra -->
        <a href="{{ '/letteratura' | relative_url }}">Letteratura</a>
      </div>
    </nav>
  </header>

  <!-- Corpo / Layout "Card" -->
  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 {{ site.author }}. Creato con Jekyll e ❤️.</p>
  </footer>

</body>
</html>
